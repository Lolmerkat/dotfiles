source = colors.conf

general {
    hide_cursor = true
    ignore_empty_input = true
    immediate_render = true
}

auth {
    fingerprint {
        enabled = true
    }
}

background {
    monitor =
    path = $image
    color = $surface

    # Optimized for performance
    blur_passes = 2
    blur_size = 4
}

# -----------------------------------------------------
# STATUS BAR (Top)
# -----------------------------------------------------

# BATTERY (Top Right)
label {
    monitor =
    text = cmd[update:5000] echo "<span>$(cat /sys/class/power_supply/BAT*/capacity | head -1)%</span>"
    font_family = JetBrainsMono Bold
    font_size = 14
    color = $on_surface_variant

    position = -30, -30
    halign = right
    valign = top
}

# -----------------------------------------------------
# CENTER LAYOUT
# -----------------------------------------------------

# CLOCK
label {
    monitor =
    text = $TIME
    font_family = JetBrainsMono ExtraBold
    font_size = 120
    color = $primary

    position = 0, 100
    halign = center
    valign = center

    shadow_passes = 2
    shadow_size = 3
    shadow_color = $shadow
}

# INPUT FIELD
input-field {
    monitor =
    size = 280, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    rounding = -1

    font_color = $on_surface
    placeholder_text = <i>Input Password...</i>
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>

    inner_color = $surface_container_high
    outer_color = $primary
    check_color = $tertiary
    fail_color = $error
    capslock_color = $secondary_fixed

    position = 0, -100
    halign = center
    valign = center
}
